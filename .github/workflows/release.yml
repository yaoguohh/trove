# Release pipeline for ClipDeck (free path: ad-hoc signed, not notarized, Sparkle auto-updates).
#
# Trigger: push a tag like `v0.2.0`.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   SPARKLE_ED_PRIVATE_KEY  — the EdDSA PRIVATE key from `generate_keys -x` (PEM contents).
#   SU_PUBLIC_KEY           — the EdDSA PUBLIC key string (becomes SUPublicEDKey in Info.plist).
#
# See RELEASE.md for the full runbook and the hard constraints this pipeline must honor.

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write          # create the GitHub Release + upload assets

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select latest stable Xcode (Swift 6 — the runner default is Swift 5.10)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build & test
        run: |
          swift build
          swift test

      - name: Package signed .app (ad-hoc + Sparkle embedded)
        env:
          CLIPDECK_SU_PUBLIC_KEY: ${{ secrets.SU_PUBLIC_KEY }}
          CLIPDECK_SU_FEED_URL: "https://github.com/${{ github.repository }}/releases/latest/download/appcast.xml"
        run: |
          # Drive the version from the tag (v0.2.0 → 0.2.0); run_number is the monotonic build.
          export CLIPDECK_MARKETING_VERSION="${GITHUB_REF_NAME#v}"
          export CLIPDECK_BUILD_VERSION="${{ github.run_number }}"
          bash scripts/package-app.sh

      - name: Verify signature
        run: codesign --verify --deep --strict --verbose=2 .build/ClipDeck.app

      - name: Build .dmg
        run: |
          mkdir -p dist
          STAGE="$(mktemp -d)"
          cp -R .build/ClipDeck.app "$STAGE/"
          ln -s /Applications "$STAGE/Applications"   # drag-to-install; Sparkle ignores the symlink
          hdiutil create \
            -volname "ClipDeck" \
            -srcfolder "$STAGE" \
            -fs HFS+ -format UDZO -imagekey zlib-level=9 -ov \
            "dist/ClipDeck.dmg"
          rm -rf "$STAGE"

      - name: Fetch Sparkle CLI tools
        run: |
          # Keep this version in sync with Package.resolved.
          SPARKLE_VERSION="2.9.2"
          curl -L -o /tmp/sparkle.tar.xz \
            "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz"
          mkdir -p /tmp/sparkle && tar -xf /tmp/sparkle.tar.xz -C /tmp/sparkle

      - name: Generate appcast (EdDSA-signed)
        run: |
          printf '%s' "${{ secrets.SPARKLE_ED_PRIVATE_KEY }}" > /tmp/sparkle_ed_private_key
          # --download-url-prefix makes enclosures point at the GitHub Release download URL
          # (generate_appcast otherwise emits bare filenames).
          /tmp/sparkle/bin/generate_appcast \
            --ed-key-file /tmp/sparkle_ed_private_key \
            --download-url-prefix "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/" \
            dist/
          rm -f /tmp/sparkle_ed_private_key

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/ClipDeck.dmg
            dist/appcast.xml
          generate_release_notes: true
      # SUFeedURL points at releases/latest/download/appcast.xml, so uploading appcast.xml as a
      # Release asset (above) IS the published feed — nothing needs to be committed back to main.
